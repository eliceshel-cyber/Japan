    const PlusIco  = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
    const SaveIco  = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>;
    const CloseIco = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const ResetIco = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>;

    function App() {
      const [expenses,setExpenses]       = useState([]);
      const [settings,setSettings]       = useState(DEFAULT_SETTINGS);
      const [loaded,setLoaded]           = useState(false);
      const [view,setView]               = useState('date');
      const [editingExp,setEditingExp]   = useState(null);
      const [showAdd,setShowAdd]         = useState(false);
      const [showSettings,setShowSettings] = useState(false);
      const [expanded,setExpanded]       = useState(new Set());

      useEffect(() => {
        try { const s=localStorage.getItem(STORAGE_KEY);  setExpenses(s?JSON.parse(s):DEFAULT_EXPENSES); } catch(e){ setExpenses(DEFAULT_EXPENSES); }
        try { const s=localStorage.getItem(SETTINGS_KEY); if(s) setSettings(JSON.parse(s)); } catch(e){}
        setLoaded(true);
        const el=document.getElementById('loading'); if(el) el.style.display='none';
      },[]);

      useEffect(()=>{ if(!loaded) return; try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(expenses)); }catch(e){} },[expenses,loaded]);
      useEffect(()=>{ if(!loaded) return; try{ localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings)); }catch(e){} },[settings,loaded]);

      const allDates = useMemo(()=>dateRange(TRIP_START,TRIP_END),[]);
      const byDate   = useMemo(()=>{ const m={}; allDates.forEach(d=>{m[d]=[];}); expenses.forEach(e=>{ if(!m[e.date])m[e.date]=[]; m[e.date].push(e); }); return m; },[expenses,allDates]);
      const byCat    = useMemo(()=>{ const t={}; Object.keys(CATEGORIES).forEach(c=>{t[c]=0;}); expenses.forEach(e=>{t[e.category]=(t[e.category]||0)+(Number(e.amount)||0);}); return t; },[expenses]);
      const dayTots  = useMemo(()=>{ const t={}; Object.entries(byDate).forEach(([d,arr])=>{t[d]=arr.reduce((s,e)=>s+(Number(e.amount)||0),0);}); return t; },[byDate]);
      const grand    = useMemo(()=>expenses.reduce((s,e)=>s+(Number(e.amount)||0),0),[expenses]);
      const confirmed= useMemo(()=>expenses.filter(e=>e.source==='confirmed').reduce((s,e)=>s+(Number(e.amount)||0),0),[expenses]);
      const estimated= useMemo(()=>grand-confirmed,[grand,confirmed]);

      const addExp    = (exp) => setExpenses(p=>[...p,{...exp,id:uid(),source:exp.source||'manual'}]);
      const updateExp = (id,upd) => setExpenses(p=>p.map(e=>e.id===id?{...e,...upd}:e));
      const deleteExp = (id) => setExpenses(p=>p.filter(e=>e.id!==id));
      const reset     = () => { if(window.confirm('Reset all data to trip defaults?')) setExpenses(DEFAULT_EXPENSES); };
      const toggle    = (d) => setExpanded(p=>{ const n=new Set(p); n.has(d)?n.delete(d):n.add(d); return n; });
      const expandAll = () => setExpanded(new Set(allDates));
      const collapseAll = () => setExpanded(new Set());

      if(!loaded) return null;
      const cur=settings.displayCurrency;

      return (
        <div style={S.root}>
          <header style={S.hdr}>
            <div style={S.hdrRow}>
              <div style={S.hdrLeft}>
                <div style={S.stamp}>日本</div>
                <div>
                  <h1 style={S.title}>Japan 2026</h1>
                  <p style={S.subtitle}>Sept 16 – Oct 7 · 5 adults · {expenses.length} items</p>
                </div>
              </div>
              <button style={S.iconBtn} onClick={()=>setShowSettings(true)}><GearIco/></button>
            </div>
            <div style={S.totals}>
              <div style={S.grandBlock}>
                <div style={S.grandLbl}>TOTAL</div>
                <div style={S.grandVal}>{money(grand,cur,settings)}</div>
                <div style={S.grandSub}>
                  {cur!=='JPY'&&<span>¥{Math.round(grand).toLocaleString()}</span>}
                  {cur!=='USD'&&<span>${Math.round(grand/settings.usdRate).toLocaleString()}</span>}
                  {cur!=='ILS'&&<span>₪{Math.round(grand/settings.ilsRate).toLocaleString()}</span>}
                  <span style={{opacity:.5}}>· {money(grand/settings.partySize,cur,settings)}/pax</span>
                </div>
              </div>
              <div style={S.splitRow}>
                <div style={S.sConf}><div style={S.sLbl}>✓ CONFIRMED</div><div style={S.sAmt}>{money(confirmed,cur,settings)}</div></div>
                <div style={S.sEst}><div style={S.sLbl}>~ ESTIMATED</div><div style={S.sAmt}>{money(estimated,cur,settings)}</div></div>
              </div>
            </div>
            <div style={S.pills}>
              {Object.entries(CATEGORIES).map(([cat,conf])=>{
                const total=byCat[cat]||0; if(!total) return null;
                const catConf=expenses.filter(e=>e.category===cat&&e.source==='confirmed').reduce((s,e)=>s+Number(e.amount),0);
                const catEst=total-catConf;
                return (
                  <div key={cat} style={{...S.pill,borderLeftColor:conf.color}}>
                    <span style={S.pillEmoji}>{conf.emoji}</span>
                    <span style={S.pillName}>{cat}</span>
                    <div style={S.pillAmts}>
                      {catConf>0&&<span style={S.pillConf}>{money(catConf,cur,settings)} ✓</span>}
                      {catEst>0&&<span style={S.pillEst}>{money(catEst,cur,settings)} ~</span>}
                    </div>
                  </div>
                );
              })}
            </div>
          </header>

          <div style={S.ctrl}>
            <div style={S.vtoggle}>
              {['date','category'].map(v=>(
                <button key={v} onClick={()=>setView(v)} style={{...S.vBtn,...(view===v?S.vBtnOn:{})}}>
                  {v==='date'?'By Date':'By Category'}
                </button>
              ))}
            </div>
            <div style={S.ctrlR}>
              {view==='date'&&<><button style={S.smBtn} onClick={expandAll}>Expand</button><button style={S.smBtn} onClick={collapseAll}>Collapse</button></>}
              <button style={S.addBtn} onClick={()=>setShowAdd(true)}><PlusIco/> Add</button>
            </div>
          </div>

          <main style={S.main}>
            {view==='date'&&(
              <div style={S.dateList}>
                {allDates.map(d=>{
                  const items=byDate[d]||[]; const total=dayTots[d]||0; const open=expanded.has(d);
                  return (
                    <div key={d} style={S.dCard}>
                      <button style={S.dHdr} onClick={()=>toggle(d)}>
                        <div style={S.dHdrL}>{open?<ChevD/>:<ChevR/>}<span style={S.dLbl}>{fmt(d)}</span>{items.length>0&&<span style={S.dCnt}>{items.length}</span>}</div>
                        <span style={{...S.dTotal,opacity:total?1:0.3}}>{total?money(total,cur,settings):'—'}</span>
                      </button>
                      {open&&<div style={S.lineItems}>{items.length===0?<div style={S.emptyDay}>No expenses</div>:items.map(e=><LineItem key={e.id} expense={e} settings={settings} onEdit={setEditingExp} onDelete={deleteExp}/>)}</div>}
                    </div>
                  );
                })}
              </div>
            )}
            {view==='category'&&(
              <div style={S.catList}>
                {Object.entries(CATEGORIES).map(([cat,conf])=>{
                  const items=expenses.filter(e=>e.category===cat).sort((a,b)=>a.date.localeCompare(b.date));
                  if(!items.length) return null;
                  const total=items.reduce((s,e)=>s+Number(e.amount),0);
                  return (
                    <div key={cat} style={{...S.catCard,borderTopColor:conf.color}}>
                      <div style={S.catHdr}>
                        <div style={S.catHdrL}><span style={{fontSize:22}}>{conf.emoji}</span><h3 style={{...S.catTitle,color:conf.color}}>{cat}</h3><span style={S.catCnt}>{items.length}</span></div>
                        <div style={{...S.catTotal,color:conf.color}}>{money(total,cur,settings)}</div>
                      </div>
                      {items.map(e=><LineItem key={e.id} expense={e} settings={settings} onEdit={setEditingExp} onDelete={deleteExp} showDate/>)}
                    </div>
                  );
                })}
              </div>
            )}
          </main>

          <footer style={S.footer}>
            <span>Each person gets their own independent copy · drop receipts in chat to update</span>
            <button style={S.resetBtn} onClick={reset}><ResetIco/> Reset to defaults</button>
          </footer>

          {(showAdd||editingExp)&&<ExpenseModal expense={editingExp} onClose={()=>{setEditingExp(null);setShowAdd(false);}} onSave={exp=>{if(editingExp)updateExp(editingExp.id,exp);else addExp(exp);setEditingExp(null);setShowAdd(false);}}/>}
          {showSettings&&<SettingsModal settings={settings} onClose={()=>setShowSettings(false)} onSave={s=>{setSettings(s);setShowSettings(false);}}/>}
        </div>
      );
    }

    function LineItem({expense:e,settings,onEdit,onDelete,showDate}) {
      const conf=CATEGORIES[e.category]||CATEGORIES.Other; const cur=settings.displayCurrency;
      return (
        <div style={S.li}>
          <div style={{...S.liBar,background:conf.color}}/>
          <div style={S.liMain}>
            <div style={S.liTop}><span style={S.liEmoji}>{conf.emoji}</span><span style={S.liDesc}>{e.desc}</span></div>
            <div style={S.liMeta}>
              {e.source==='confirmed'&&<span style={S.bConf}>✓ confirmed</span>}
              {e.source==='manual'&&<span style={S.bMan}>manual</span>}
              {showDate&&<span style={S.liDate}>{fmt(e.date)}</span>}
              {e.notes&&<span style={S.liNotes}>{e.notes}</span>}
            </div>
          </div>
          <div style={S.liAmt}>{money(e.amount,cur,settings)}</div>
          <div style={S.liActions}>
            <button style={S.liBtn} onClick={()=>onEdit(e)}><EditIco/></button>
            <button style={S.liBtn} onClick={()=>{if(window.confirm('Delete this expense?'))onDelete(e.id);}}><TrashIco/></button>
          </div>
        </div>
      );
    }

    function ExpenseModal({expense,onClose,onSave}) {
      const [f,setF]=useState(expense||{date:'2026-09-16',category:'Food',desc:'',amount:'',notes:'',source:'manual'});
      const set=(k,v)=>setF(p=>({...p,[k]:v}));
      const submit=()=>{
        if(!f.desc.trim()){alert('Description required');return;}
        if(!f.amount||isNaN(Number(f.amount))){alert('Valid JPY amount required');return;}
        onSave({...f,amount:Math.round(Number(f.amount))});
      };
      return (
        <div style={S.mbg} onClick={onClose}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={S.mHdr}><h2 style={S.mTitle}>{expense?'Edit expense':'Add expense'}</h2><button style={S.mClose} onClick={onClose}><CloseIco/></button></div>
            <div style={S.mForm}>
              <label style={S.mLbl}>Date<input type="date" value={f.date} min="2026-09-15" max="2026-10-07" onChange={e=>set('date',e.target.value)} style={S.mInput}/></label>
              <label style={S.mLbl}>Category<select value={f.category} onChange={e=>set('category',e.target.value)} style={S.mInput}>{Object.keys(CATEGORIES).map(c=><option key={c} value={c}>{CATEGORIES[c].emoji} {c}</option>)}</select></label>
              <label style={{...S.mLbl,gridColumn:'1/-1'}}>Description<input type="text" value={f.desc} onChange={e=>set('desc',e.target.value)} placeholder="e.g. Sushi dinner Kyoto" style={S.mInput}/></label>
              <label style={S.mLbl}>Amount ¥ JPY whole group<input type="number" value={f.amount} onChange={e=>set('amount',e.target.value)} placeholder="e.g. 15000" style={S.mInput}/></label>
              <label style={S.mLbl}>Source<select value={f.source||'manual'} onChange={e=>set('source',e.target.value)} style={S.mInput}><option value="manual">Manual</option><option value="confirmed">Confirmed</option><option value="estimate">Estimate</option></select></label>
              <label style={{...S.mLbl,gridColumn:'1/-1'}}>Notes (optional)<input type="text" value={f.notes||''} onChange={e=>set('notes',e.target.value)} placeholder="vendor, payment method…" style={S.mInput}/></label>
            </div>
            <div style={S.mFtr}><button style={S.btnSec} onClick={onClose}>Cancel</button><button style={S.btnPri} onClick={submit}><SaveIco/> {expense?'Save':'Add'}</button></div>
          </div>
        </div>
      );
    }

    function SettingsModal({settings,onClose,onSave}) {
      const [f,setF]=useState(settings);
      const set=(k,v)=>setF(p=>({...p,[k]:v}));
      return (
        <div style={S.mbg} onClick={onClose}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={S.mHdr}><h2 style={S.mTitle}>Settings</h2><button style={S.mClose} onClick={onClose}><CloseIco/></button></div>
            <div style={S.mForm}>
              <label style={S.mLbl}>Display currency<select value={f.displayCurrency} onChange={e=>set('displayCurrency',e.target.value)} style={S.mInput}><option value="JPY">¥ JPY</option><option value="USD">$ USD</option><option value="ILS">₪ ILS</option></select></label>
              <label style={S.mLbl}>Party size<input type="number" value={f.partySize} onChange={e=>set('partySize',Number(e.target.value)||1)} style={S.mInput}/></label>
              <label style={S.mLbl}>1 USD = ? JPY<input type="number" value={f.usdRate} onChange={e=>set('usdRate',Number(e.target.value))} style={S.mInput}/></label>
              <label style={S.mLbl}>1 ILS = ? JPY<input type="number" value={f.ilsRate} onChange={e=>set('ilsRate',Number(e.target.value))} style={S.mInput}/></label>
            </div>
            <div style={S.mFtr}><button style={S.btnSec} onClick={onClose}>Cancel</button><button style={S.btnPri} onClick={()=>onSave(f)}><SaveIco/> Save</button></div>
          </div>
        </div>
      );
    }

    const S = {
      root:      {minHeight:'100vh',background:'#f5f1e8',paddingBottom:60},
      hdr:       {background:'#1a1a1a',color:'#f5f1e8',padding:'22px 16px 18px'},
      hdrRow:    {display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:18},
      hdrLeft:   {display:'flex',alignItems:'center',gap:14},
      stamp:     {fontFamily:"'Fraunces',serif",background:'#d04231',color:'#f5f1e8',padding:'8px 11px',fontSize:22,transform:'rotate(-2deg)',boxShadow:'2px 3px 0 rgba(0,0,0,0.3)',flexShrink:0},
      title:     {fontFamily:"'Fraunces',serif",fontWeight:500,fontSize:22,letterSpacing:-0.5},
      subtitle:  {fontSize:12,opacity:0.6,marginTop:3},
      iconBtn:   {width:36,height:36,background:'rgba(245,241,232,0.1)',border:'1px solid rgba(245,241,232,0.2)',color:'#f5f1e8',borderRadius:4,display:'flex',alignItems:'center',justifyContent:'center'},
      totals:    {marginBottom:14},
      grandBlock:{marginBottom:10},
      grandLbl:  {fontSize:10,textTransform:'uppercase',letterSpacing:2,opacity:0.5},
      grandVal:  {fontFamily:"'Fraunces',serif",fontSize:36,fontWeight:500,lineHeight:1.1,marginTop:4},
      grandSub:  {fontFamily:"'JetBrains Mono',monospace",fontSize:11,marginTop:5,opacity:0.6,display:'flex',gap:10,flexWrap:'wrap'},
      splitRow:  {display:'flex',gap:10},
      sConf:     {background:'rgba(61,90,61,0.4)',border:'1px solid rgba(100,160,100,0.35)',padding:'7px 12px',borderRadius:3,flex:1},
      sEst:      {background:'rgba(184,101,27,0.3)',border:'1px solid rgba(184,101,27,0.35)',padding:'7px 12px',borderRadius:3,flex:1},
      sLbl:      {fontSize:10,textTransform:'uppercase',letterSpacing:1,opacity:0.75,marginBottom:2},
      sAmt:      {fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:600},
      pills:     {display:'flex',flexDirection:'column',gap:5,marginTop:14},
      pill:      {background:'rgba(245,241,232,0.07)',borderLeft:'3px solid',padding:'7px 10px',display:'flex',alignItems:'center',gap:8,borderRadius:'0 3px 3px 0'},
      pillEmoji: {fontSize:13,flexShrink:0},
      pillName:  {fontSize:12,fontWeight:600,flex:1},
      pillAmts:  {display:'flex',flexDirection:'column',alignItems:'flex-end',gap:1},
      pillConf:  {fontFamily:"'JetBrains Mono',monospace",fontSize:11,color:'#7ecf8e',fontWeight:600},
      pillEst:   {fontFamily:"'JetBrains Mono',monospace",fontSize:10,opacity:0.5},
      ctrl:      {display:'flex',alignItems:'center',justifyContent:'space-between',padding:'12px 16px',background:'#fff',borderBottom:'1px solid #e3dac4',gap:10,flexWrap:'wrap'},
      vtoggle:   {display:'flex',border:'1px solid #d0c8b3',borderRadius:3,overflow:'hidden'},
      vBtn:      {padding:'7px 14px',background:'transparent',border:'none',borderRight:'1px solid #d0c8b3',fontSize:13,fontWeight:500,color:'#666'},
      vBtnOn:    {background:'#1a3a52',color:'#fff'},
      ctrlR:     {display:'flex',gap:8,alignItems:'center'},
      smBtn:     {padding:'6px 10px',background:'transparent',border:'1px solid #d0c8b3',fontSize:12,color:'#666',borderRadius:3},
      addBtn:    {padding:'7px 13px',background:'#1a3a52',color:'#fff',border:'none',fontSize:13,fontWeight:600,borderRadius:3,display:'flex',alignItems:'center',gap:5},
      main:      {padding:'12px 16px'},
      dateList:  {display:'flex',flexDirection:'column',gap:5},
      dCard:     {background:'#fff',border:'1px solid #e3dac4',borderRadius:4},
      dHdr:      {width:'100%',padding:'11px 13px',display:'flex',justifyContent:'space-between',alignItems:'center',background:'transparent',border:'none',textAlign:'left'},
      dHdrL:     {display:'flex',alignItems:'center',gap:10},
      dLbl:      {fontFamily:"'Fraunces',serif",fontSize:16,fontWeight:500},
      dCnt:      {fontSize:11,background:'#f5f1e8',padding:'2px 7px',borderRadius:10,color:'#888'},
      dTotal:    {fontFamily:"'JetBrains Mono',monospace",fontSize:14,fontWeight:500},
      lineItems: {borderTop:'1px solid #f0e8d8'},
      emptyDay:  {padding:'10px 16px',fontSize:12,color:'#bbb',fontStyle:'italic'},
      li:        {display:'grid',gridTemplateColumns:'4px 1fr auto auto',gap:10,alignItems:'center',padding:'10px 13px',borderTop:'1px solid #f8f3ea'},
      liBar:     {width:4,height:28,borderRadius:2,alignSelf:'center'},
      liMain:    {minWidth:0},
      liTop:     {display:'flex',alignItems:'flex-start',gap:7},
      liEmoji:   {fontSize:12,flexShrink:0,marginTop:2},
      liDesc:    {fontSize:13,fontWeight:500,lineHeight:1.4,wordBreak:'break-word'},
      liMeta:    {display:'flex',flexWrap:'wrap',gap:5,marginTop:4,alignItems:'center'},
      liDate:    {fontFamily:"'JetBrains Mono',monospace",fontSize:10,color:'#b8651b'},
      liNotes:   {fontSize:10,color:'#bbb',fontStyle:'italic'},
      liAmt:     {fontFamily:"'JetBrains Mono',monospace",fontSize:13,fontWeight:500,whiteSpace:'nowrap'},
      liActions: {display:'flex',gap:2},
      liBtn:     {width:28,height:28,background:'transparent',border:'none',color:'#ccc',display:'flex',alignItems:'center',justifyContent:'center',borderRadius:3},
      bConf:     {fontSize:9,padding:'2px 6px',background:'#1a3a52',color:'#fff',borderRadius:2,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5},
      bMan:      {fontSize:9,padding:'2px 6px',background:'#e8f3ec',color:'#3d5a3d',borderRadius:2,fontWeight:700,textTransform:'uppercase',letterSpacing:0.5},
      catList:   {display:'flex',flexDirection:'column',gap:12},
      catCard:   {background:'#fff',border:'1px solid #e3dac4',borderTop:'3px solid',borderRadius:4},
      catHdr:    {padding:'13px 16px',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'1px solid #f0e8d8'},
      catHdrL:   {display:'flex',alignItems:'center',gap:10},
      catTitle:  {fontFamily:"'Fraunces',serif",fontSize:18,fontWeight:500,margin:0},
      catCnt:    {fontSize:11,background:'#f5f1e8',padding:'2px 8px',borderRadius:10,color:'#888'},
      catTotal:  {fontFamily:"'JetBrains Mono',monospace",fontSize:16,fontWeight:600},
      footer:    {padding:'18px 16px',fontSize:11,color:'#aaa',display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10,borderTop:'1px solid #d0c8b3',marginTop:20},
      resetBtn:  {background:'transparent',border:'1px solid #d0c8b3',padding:'5px 10px',fontSize:11,color:'#888',display:'flex',alignItems:'center',gap:4,borderRadius:3},
      mbg:       {position:'fixed',inset:0,background:'rgba(0,0,0,0.55)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,padding:16},
